<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERSPECTIVES | Joshua Hart</title>
    <style>
        /* --- QUIET LUXURY: VANTA BLACK & SILVER --- */
        body {
            background-color: #000000;
            color: #C0C0C0; /* Silver */
            font-family: 'Georgia', serif;
            text-align: center;
            margin: 0;
            padding: 40px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ARTIST AVATAR */
        .avatar-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 3px solid #333; /* Dark Grey Ring */
            overflow: hidden;
            background: #111;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        /* This looks for the file 'artist.png' you upload */
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.2); /* Artistic B&W */
        }

        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #fff;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .tagline {
            font-style: italic;
            color: #888;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        /* AUDIO PLAYER CUSTOMIZATION */
        audio {
            margin-bottom: 40px;
            filter: invert(1); /* Makes the player dark mode */
            opacity: 0.7;
        }

        /* GALLERY PREVIEW */
        .gallery-preview {
            display: flex;
            gap: 15px;
            opacity: 0.5;
            margin-bottom: 40px;
        }
        .preview-box {
            width: 60px;
            height: 60px;
            border: 1px solid #333;
            background: #050505;
        }

        .btn {
            padding: 15px 35px;
            border: 1px solid #C0C0C0;
            color: #C0C0C0;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn:hover { background: #C0C0C0; color: #000; }
    </style>
</head>
<body>

    <div class="avatar-container">
        <img src="artist.png" alt="Joshua Hart" onerror="this.style.display='none'">
    </div>

    <h1>Perspectives</h1>
    <div class="tagline">"Showing you the world from a different perspective."</div>

    <audio controls src="voice.mp3"></audio>

    <div class="gallery-preview">
        <div class="preview-box"></div>
        <div class="preview-box"></div>
        <div class="preview-box"></div>
    </div>

    <a href="mailto:joshuahart@perspectivesfromthehart.com" class="btn">Inquire for Prints</a>

</body>
</html>
